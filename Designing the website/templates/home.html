<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loop Buddy</title>

  <!-- Baumans-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baumans&family=Molle&family=Sarina&display=swap" rel="stylesheet">
  <!-- Clean up unused fonts-->

  <!-- leaflet setup start -->
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

   <!-- Make sure you put this AFTER Leaflet's CSS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
  <!-- leaflet setup emd -->


  <style>

    #map {
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Baumans', cursive;
      background-color: #fdfdf6;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-box {
      margin-top: 40px;
      padding: 20px 40px;
      border: 4px solid black;
      border-radius: 15px;
      text-align: center;
      font-size: 24px;
    }

    .settings-container {
      margin-top: 60px;
      display: flex;
      justify-content: space-between;
      width: 80%;
    }

    .map-box {
      width: 300px;
      height: 400px;
      border: 4px solid black;
      border-radius: 15px;
      padding: 20px;
      font-size: 18px;
      text-align: center;
    }

    .settings-box {
      width: 200px;
      border: 4px solid black;
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      font-size: 18px;
    }

    .settings-box .label {
      margin-bottom: 10px;
      font-weight: bold;
    }

    .settings-box-content {
      height: 400px;
      border-top: 4px solid black;
      margin-top: 10px;
      padding-top: 10px;
    }

    .route-button-container {
      margin-top: 0px;
      text-align: center;
    }

    #create-route {
      background-color: black;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Baumans', cursive;
      transition: background-color 0.2s;
    }

    #create-route:hover {
      background-color: #333;
    }



  </style>
</head>
<body>
  <div class="top-box">Loop buddy</div>

  <div class="settings-container">
    <div class="settings-box">
      <div class="label">Settings:</div>
      <div class="settings-box-content">
        <p>I'm just happy to see these boxes work :D</p>
        <!-- Put settings controls here -->
      </div>
    </div>



    <div class = "map-box"> <div id="map"></div> </div>

    <div class="settings-box">
      <div class="label">Advanced settings</div>
      <div class="settings-box-content">
        <!-- Put advanced settings controls here -->
      </div>
    </div>



  </div>

  <div class="route-button-container">
    <button id="create-route">Create route</button>
    </div>

<script>
  const map = L.map('map').setView([48.2082, 16.3738], 13); // Vienna coords

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  let marker;  // put this outside the click handler

map.on('click', function(e) {
  const latlng = e.latlng;

  // Remove old marker if it exists
  if (marker) {
    map.removeLayer(marker);
  }

  // Add new marker
  marker = L.marker(latlng).addTo(map);

  // Send to backend
  fetch('/clicked', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      lat: latlng.lat,
      lng: latlng.lng
    })
  });
});

</script>

</body>
</html>
